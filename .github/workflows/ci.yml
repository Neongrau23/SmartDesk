name: SmartDesk CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Windows (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        python -m ruff check . --select=E9,F63,F7,F82 --output-format=github
        # Default checks (warn only for now, later enforce)
        python -m ruff check . --exit-zero

    - name: Test with pytest
      env:
        # Wichtig für GUI-Tests ohne Monitor
        QT_QPA_PLATFORM: offscreen
        # PYTHONPATH setzen, damit src/ gefunden wird
        PYTHONPATH: src
        # Fake AppData für Tests
        APPDATA: ${{ github.workspace }}\test_appdata
      run: |
        mkdir test_appdata
        pytest tests/ -v
