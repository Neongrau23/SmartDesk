# SmartDesk CI/CD Pipeline
# Führt automatisch Tests aus bei Push und Pull Requests

name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Run Tests
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run Tests with Coverage
      run: |
        pytest tests/ --cov=smartdesk --cov-report=xml --cov-report=term-missing
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false
      continue-on-error: true

  lint:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Run Flake8 (Warnings only)
      run: |
        flake8 src/smartdesk --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/smartdesk --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      continue-on-error: true
